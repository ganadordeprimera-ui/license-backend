services:
  - type: web
    name: license-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ADMIN_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
    disk:
      name: licenses-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
